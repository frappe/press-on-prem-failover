{% extends "base.html" %}

{% block title %}Missing Bench Files{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6 text-center py-5">

    <i class="bi bi-folder-x text-danger" style="font-size: 4rem;"></i>

    <h2 class="mt-3 mb-2">Missing Bench Files</h2>
    <p class="text-muted mb-4">
      One or more required bench files could not be found. The failover process cannot continue until this is resolved.
    </p>

    <div class="alert alert-danger text-start d-flex gap-2 align-items-start mb-4">
      <i class="bi bi-exclamation-triangle-fill flex-shrink-0 mt-1"></i>
      <code class="small">{{ message }}</code>
    </div>

    <a href="{{ url_for('failover_setup_status') }}"
       class="btn btn-primary d-inline-flex align-items-center gap-2">
      <i class="bi bi-arrow-left"></i>
      Back to Setup Status
    </a>

  </div>
</div>
{% endblock %}
