<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Failover | Frappe Cloud{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/base.css">
</head>
<body>

    <nav class="navbar">
        <a class="navbar-brand" href="/">
            <span class="brand-icon">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 6L5 9L10 3" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            Failover Manager
        </a>
    </nav>

    <main class="page-container">
        <div class="page-header">
            <div class="page-header-left">
                <nav class="breadcrumb">
                    <a href="/">Home</a>
                    <span class="breadcrumb-sep">›</span>
                    {% block breadcrumbs %}<span class="breadcrumb-current">Dashboard</span>{% endblock %}
                </nav>
                <h1 class="page-title">{% block header %}Dashboard{% endblock %}</h1>
            </div>
            <div class="page-actions">
                {% block actions %}{% endblock %}
            </div>
        </div>

        {% block content %}{% endblock %}
    </main>
</body>
</html>
